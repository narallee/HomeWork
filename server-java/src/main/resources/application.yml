server:
  port: 3000

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:wechat_collab}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.collab.model.entity
  configuration:
    map-underscore-to-camel-case: true

# 微信小程序配置
wx:
  app-id: ${WX_APPID:}
  secret: ${WX_SECRET:}

# JWT配置
jwt:
  secret: ${JWT_SECRET:default_jwt_secret_please_change}
  expiration: ${JWT_EXPIRES_IN:604800000}  # 7天（毫秒）

logging:
  level:
    com.collab: debug
